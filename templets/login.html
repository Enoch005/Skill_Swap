<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillSwap Login</title>

<style>

    .circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    animation:float 10s infinite linear;
}

.circle:nth-child(1){
    width:150px;
    height:150px;
    left:10%;
    top:20%;
}

.circle:nth-child(2){
    width:250px;
    height:250px;
    right:5%;
    bottom:10%;
}

.circle:nth-child(3){
    width:100px;
    height:100px;
    left:70%;
    top:10%;
}

.circle:nth-child(4){
    width:180px;
    height:180px;
    left:80%;
    top:70%;
}

@keyframes float{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-30px);
    }
    100%{
        transform:translateY(0px);
    }
}


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#2563eb,#7c3aed,#06b6d4,#1d4ed8);
    background-size:400% 400%;
    animation:gradientBG 12s ease infinite;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:450px;
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 20px 40px rgba(0,0,0,0.25);
    color:white;
}

.brand-name{
    text-align:center;
    font-size:48px;
    font-weight:800;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    margin-bottom:35px;
    color:#f1f5f9;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:20px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.2);
    color:white;
}

input::placeholder{
    color:#e5e7eb;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:white;
    color:#2563eb;
    font-weight:bold;
    cursor:pointer;
}

.login-footer{
    text-align:center;
    margin-top:20px;
}

.login-footer a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
<div class="container">

<h1 class="brand-name">SkillSwap</h1>

<p class="subtitle">
    Welcome Back 👋
</p>

<form method="POST">

    <label>Email Address</label>
    <input type="email"
           name="email"
           placeholder="Enter your email"
           required>

    <label>Password</label>
    <input type="password"
           name="password"
           placeholder="Enter your password"
           required>

    <button type="submit">
        Login
    </button>

</form>

<div class="login-footer">
    Don't have an account?
    <a href="/register">Register</a>
</div>


</div>

</body>
</html>
